<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h2>Cadastro de local e nascimento</h2>
    Insira sua cidade de nascimento: <input type="text" id="ipt_cidade">
    <br>
    Insira seu ano de nascimento: <input id="ipt_data"><button onclick="anoCidade()">Cadastrar</button>
    
</body>
</html>

<script>
    function anoCidade() {
        alert('Você nasceu na cidade ' + ipt_cidade.value + ' em ' + ipt_data.value);
    }
</script>
