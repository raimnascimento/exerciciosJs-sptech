<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Pare, pense ou diga</h2>

    <button onclick="pare()">Pare</button>
    <br><br>
    <button onclick="pense()">Pense</button>
    <br><br>
    <button onclick="siga()">Siga</button>
    <br><br>
    <div id="div_mensagem"></div>

</body>
</html>
<script>
    function pare() {
        div_mensagem.innerHTML = 'Pare e Aguarde!';  
    }
    
    function pense() {
        div_mensagem.innerHTML = 'Pense se pode seguir ou se deve parar!'
    }

    function siga() {
        div_mensagem.innerHTML = 'Pode seguir adiante';
    }
</script>
