<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <h2>Opinião da família</h2>
    <br><br>
    Insira a sua nota da escola: <input type="number" id="ipt_nota">
    <br><br>
    <button onclick="opnNotaAvo()">Opinião da Avó</button>
    <br><br>
    <button onclick="opnNotaMae()">Opinião da Mãe</button>

    <div id="opiniao_final"></div>
    
</body>
</html>
<script>

    function opnNotaAvo() {
        let nota = ipt_nota.value;
        opiniao_final.innerHTML = 'Muito bem, que neto inteligente, porque tirou ' + nota;
        nota = '';
    }

    function opnNotaMae() {
        let nota = ipt_nota.value;
        opiniao_final.innerHTML = 'Não fez mais que tua obrigação com essa nota ' + nota;
        nota = '';
    }
</script>
