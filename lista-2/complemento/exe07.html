<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 07</title>
</head>
<body>
    <h2>Cadastro de Pet</h2>
    Insira o nome do seu pet: <input type="text" id="ipt_pet">
    <br><br>
    Insira a espécie dele: <input type="text" id="ipt_especie">
    <br><br>
    <button onclick="pet()">Identificar pet</button>
    
</body>
</html>
<script>
    function pet() {
        let nomePet = ipt_pet.value;
        let especiePet = ipt_especie.value;
        alert('O seu pet se chama ' + nomePet + ' e ele(a) é um ' + especiePet);
    }
</script>
