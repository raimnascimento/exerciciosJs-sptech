<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Lista Viva de Filmes Favoritos</h2>

    Filmes favoritos: <input type="text" id="ipt_filme">
    <br><br>
    <button onclick="cadastroFilmes()">Cadastrar</button>
    <br><br>
    <div id="divFilmes"></div>
    
</body>
</html>
<script>
    let filmes = [];

    function cadastroFilmes() {
        let filme = ipt_filme.value.trim();

        if (filme.length == 0) {
            alert('Insira algum filme.');
        } else {
            filmes.push(filme);
            divFilmes.innerHTML += `Filme: ${filmes[filmes.length - 1]}<br>`;
        }
    }

</script>
