<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios 8</title>
</head>
<body>
    <h2>Caça às Frutas (Top): Descubra se está na Lista</h2>

    Fruta que você gosta: <input type="text" id="ipt_fruta">
    <br><br>
    <button onclick="cadastrarFrutas()">Adicionar</button>
    <br><br>
    <button onclick="pesquisarFrutas()">Pesquisar</button>
    <div id="msgUsuario"></div>
    
</body>
</html>
<script>
    let frutas = [];

    function cadastrarFrutas() {
        let fruta = ipt_fruta.value.trim();

        if (fruta.length == 0) {
            alert('Por favor, digite o nome da fruta.');
        } else {
            if (frutas.indexOf(fruta) >= 0) {
                alert('Essa fruta já existe na lista.');
            } else {
                frutas.push(fruta);
                ipt_fruta.value = '';
            }
        }
    }

    function pesquisarFrutas() {
        let fruta = ipt_fruta.value.trim();

        if (frutas.indexOf(fruta) >= 0) {
            msgUsuario.innerHTML = `A fruta ${fruta} existe na lista`;
        } else {
            msgUsuario.innerHTML = `Não existe a fruta ${fruta} na lista`;
        }
    }
</script>
