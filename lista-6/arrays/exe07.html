<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 07</title>
</head>
<body>
    <h2>Filmes em Cores: Azul e Vermelho Alternados</h2>
    Filmes favoritos: <input type="text" id="ipt_filme">
    <br><br>
    <button onclick="cadastroFilmes()">Cadastrar</button>
    <br><br>
    <div id="divFilmes"></div>
    
</body>
</html>
<script>
    let filmes = [];

    function cadastroFilmes() {
        let filme = ipt_filme.value.trim();

        if (filme.length == 0) {
            alert('Insira algum filme.');
        } else {
            filmes.push(filme);

            if ((filmes.length - 1) % 2 == 0) {
                divFilmes.innerHTML += `<p style="color:blue">Filme: ${filmes[filmes.length - 1]}<br></p>`;
            } else {
                divFilmes.innerHTML += `<p style="color:red">Filme: ${filmes[filmes.length - 1]}<br></p>`;
            }
        }
    }

</script>
