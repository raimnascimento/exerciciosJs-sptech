<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h2>Painel de Favoritos: Seus Filmes em Destaque</h2>

    Filme: <input oninput="painelFilmes()" type="text" id="ipt_filme">
    <br><br>
    <button onclick="cadastro()">Cadastrar Filme</button>
    <br><br>
    <div id="msgUsuario"></div>
    
</body>
</html>
<script>
    let filmes = [];

    function cadastro() {
        let nomeFilme = ipt_filme.value.trim();

        if (nomeFilme.length == 0) {
            alert('Por favor, digite o nome do filme');
        } else {
            filmes.push(nomeFilme);
            ipt_filme.value = '';
        }
    }

    function painelFilmes() {
        msgUsuario.innerHTML = `Seu filme favorito é: <b>${filmes[0]}</b><br>`;

            if (filmes.length < 3) {
                msgUsuario.innerHTML += `Seu 3º filme ainda não existe<br>`;
            } else {
                msgUsuario.innerHTML += `Seu 3º filme é: <b>${filmes[2]}</b><br>`;
            }

            msgUsuario.innerHTML += `Total de filmes cadastrados: <b>${filmes.length}</b>`;
    }
</script>
