<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h2>Detector de Palavras</h2>
    Informe uma frase: <input type="text" id="ipt_frase">
    <br><br>
    <button onclick="detectorPalavras()">Analisar Frase</button>
    <br><br>
    <div id="msgFrases"></div>
    
</body>
</html>
<script>
    function detectorPalavras() {
        let frase = (ipt_frase.value);

        if (frase.includes('teste') || frase.includes('abc') || frase.includes('spam')) {
            msgFrases.innerHTML = `<p style="color:red">Frase Inválida</p>`; 
        } else {
            msgFrases.innerHTML = `<p style="color:green">Frase Válida!</p>`; 
        }
    }
</script>
