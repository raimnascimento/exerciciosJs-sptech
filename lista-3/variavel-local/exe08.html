<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h2>Fases do sono</h2>

    Quantas horas de sono você teve essa noite? <input type="text" id="ipt_sono">
    <br><br>
    <button onclick="mostrarHorasSono()">Calcular sono</button>
    <br><br>
    <div id="msgInicial"></div>
    <br>
    <div id="msgPrimeiraFase"></div>
    <br>
    <div id="msgSegundaFase"></div>
    <br>
    <div id="msgTerceiraFase"></div>
    <br>
    <div id="msgQuartaFase"></div>
    
</body>
</html>
<script>
    function mostrarHorasSono() {
        let horasDeSono = Number(ipt_sono.value);
        let fase1 = horasDeSono * 0.05;
        let fase2 = horasDeSono * 0.45;
        let fase3 = horasDeSono * 0.30;
        let fase4 = horasDeSono * 0.20;

        msgInicial.innerHTML = `Ao dormir ${horasDeSono} horas, você dormiu:`;
        msgPrimeiraFase.innerHTML = `${fase1} horas na fase 1`;
        msgSegundaFase.innerHTML = `${fase2} horas na fase 2`;
        msgTerceiraFase.innerHTML = `${fase3} horas na fase 3`;
        msgQuartaFase.innerHTML = `${fase4} horas na fase 4`;
    }
</script>
