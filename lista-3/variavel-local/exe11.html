<body>
    <h2>Cálculo do IMC</h2>

    Informe seu peso: <input type="text" id="ipt_peso">
    <br><br>
    Informe sua altura: <input type="text" id="ipt_altura">
    <br><br>
    <button onclick="calcImc()">Calcular IMC</button>
    <br><br>
    <div id="exibirIMC"></div>
    <br>
    <div id="msgTabelaIMC"></div>

</body>
</html>
<script>
    function calcImc() {
        let peso = Number(ipt_peso.value);
        let altura = Number(ipt_altura.value);
        let calculoImc = peso / (altura * altura);

        exibirIMC.innerHTML = `O seu IMC é ${calculoImc.toFixed(2)}.`;
