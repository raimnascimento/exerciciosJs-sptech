    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício 7</title>
    </head>
    <body>
        <h2>Autenticação Segura com Tentativas Limitadas</h2>
        Login: <input type="text" id="ipt_login">
        <br><br>
        Senha: <input type="password" id="ipt_senha">
        <br><br>
        Informação pessoal: <input type="text" id="ipt_info">
        <br><br>
        <button onclick="autenticacao()">Autenticar</button>
        <br><br>
        <div id="msgAutenticacao"></div>
        
    </body>
    </html>
    <script>
        let tentativas = 3;
        let bloqueado = false;

        function autenticacao() {
            let login = ipt_login.value;
            let senha = ipt_senha.value;
            let info = ipt_info.value;
            
            if (bloqueado == true) {
                msgAutenticacao += `Usuário BLOQUEADO! Procure seu gerente!`;
            }

            if (login == 'ana' && senha == 'braga' && (info == '1949' || info == 'louro josé')) {
                msgAutenticacao.innerHTML = `Usuário autenticado`;
            } else {
                tentativas--;
                msgAutenticacao.innerHTML = `Falha na autenticação.<br>`;

                if (tentativas > 0) {
                    msgAutenticacao.innerHTML += `Você ainda tem ${tentativas} tentativas.`;
                }

                if (tentativas == 0) {
                    msgAutenticacao.innerHTML += `<br>Usuário BLOQUEADO! Procure seu gerente!`;
                    bloqueado = true;
                }
            }


        }
    </script>
