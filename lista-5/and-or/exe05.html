<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h2>Avaliação do Clima: Está Agradável ou Desconfortável?</h2>
    Temperatura: <input type="number" id="ipt_temperatura">
    <br><br>
    Umidade: <input type="number" id="ipt_umidade">
    <br><br>
    <button onclick="clima()">Avaliar clima</button>
    <br><br>
    <div id="msgClima"></div>
    
</body>
</html>
<script>
    function clima() {
        let temperatura = ipt_temperatura.value;
        let umidade = ipt_umidade.value;

        if (umidade < 0 || umidade > 100) {
            alert('Valor de umidade inválido');
            msgClima.innerHTML = '';
        } else if (umidade >= 0 || umidade <= 100) {
            if (temperatura > 21 && temperatura < 24 && umidade < 60) {
                msgClima.innerHTML = `Clima agradável`;
            } else {
                msgClima.innerHTML = `Clima desconfortável`;
            }
        }
    }
</script>
