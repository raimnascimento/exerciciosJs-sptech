<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Desempenho Escolar: O Aluno Foi Aprovado?</h2>
    Nota do aluno: <input type="number" id="ipt_nota">
    <br><br>
    Frequência do aluno: <input type="number" id="ipt_freq">
    <br><br>
    <button onclick="analisarDesempenho()">Analisar aluno</button>
    <div id="msgDesempenholuno"></div>

    
</body>
</html>
<script>
    function analisarDesempenho() {
        let nota = Number(ipt_nota.value);
        let freq = Number(ipt_freq.value);
        ipt_nota.value = '';
        ipt_freq.value = '';

        if ((nota < 0 || nota > 10) && (freq < 0 || freq > 100)) {
            alert('Onde já se viu nota <0 ou >10?!');
            alert('Onde já se viu frequência <0 ou >100?!');
            msgDesempenholuno.innerHTML = '';   
        } else {
            if (nota >= 0 && nota < 6) {
                msgDesempenholuno.innerHTML = `Aluno ficou abaixo da média. <br>`;
            } else if (nota > 5 && nota < 9) {
                msgDesempenholuno.innerHTML = `Aluno ficou na média. <br>`;
            } else if (nota >= 8 && nota < 11) {
                msgDesempenholuno.innerHTML = `Aluno acima da média. <br>`;
            }

            if (freq >= 75) {
                msgDesempenholuno.innerHTML += `Aluno aprovado por frequência`;
            } else {
                msgDesempenholuno.innerHTML += `Aluno reprovado por frequência`;
            }
        }
    }
</script>
