<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h2>Sistema de Avaliação de Atendimento: Dê Sua Nota! </h2>

    Nota para o atendimento: <input type="number" id="ipt_nota">
    <br><br>
    <button onclick="avaliacao()">Avaliar atendimento</button>
    <br><br>
    <div id="msgAvaliacao"></div>
    
</body>
</html>
<script>
    function avaliacao() {
        let nota = Number(ipt_nota.value);
        ipt_nota.value = '';

        if (nota < 0 || nota > 10) {
            msgAvaliacao.innerHTML = `Nota inválida`;
        } else if (nota >= 0 && nota < 5) {
            msgAvaliacao.innerHTML = `Não aprovado`;
        } else if (nota >= 5 && nota <= 6) {
            msgAvaliacao.innerHTML = `Neutro`;
        } else {
            msgAvaliacao.innerHTML = `Aprovado`;
        }
    }
</script>
