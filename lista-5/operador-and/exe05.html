<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h2>Desempenho Escolar: Como Está Sua Nota?</h2>

    Informe a nota do aluno: <input type="text" id="ipt_nota">
    <br><br>
    <button onclick="desempenhoAluno()">Avaliar aluno</button>
    
</body>
</html>
<script>
    function desempenhoAluno() {
        let nota = Number(ipt_nota.value);

        if (nota < 6) {
            alert('Aluno não aprovado');
        } else if (nota >= 8.5 && nota <= 10) {
            alert('Aluno Exemplar!');
        } else {
            alert('Aluno comum e aprovado');
        }
    }
</script>
