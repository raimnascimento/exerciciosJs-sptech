<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h2>Conforto Térmico: A Temperatura Está Ideal?</h2>

    Informe a temperatura atual: <input type="text" id="ipt_temperatura">
    <br><br>
    <button onclick="sitTemperatura()">Ver situação</button>
    <br><br>
    
</body>
</html>
<script>
    function sitTemperatura() {
        let temperatura = Number(ipt_temperatura.value);

        if (temperatura > 20 && temperatura < 25) {
            alert('Temperatura confortável :D');
        } else {
            alert('Temperatura DESCONFORTÁVEL :C');
        }
    }
</script>
