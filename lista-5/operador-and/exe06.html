<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Aprovação Escolar: Notas e Frequência Fazem a Diferença!</h2>

    Informe a nota do aluno: <input type="text" id="ipt_nota">
    <br><br>
    Informe a frequência do aluno: <input type="text" id="ipt_frequencia">
    <br><br>
    <button onclick="situacaoAluno()">Avaliar aluno</button>

</body>
</html>
<script>
    function situacaoAluno() {
        let nota = Number(ipt_nota.value);
        let frequencia = Number(ipt_frequencia.value);

        if (nota > 5 && frequencia >= 75) {
            alert('Parabéns! Aprovado!');
        } else {
           alert('Infelizmente, não foi desta vez'); 
        }
    }
</script>
