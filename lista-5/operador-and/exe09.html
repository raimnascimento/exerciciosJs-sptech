<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <h2>Seleção de Pilotos: Você Tem a Altura Ideal?</h2>

    <b>Informe o intervalo da altura desejada:</b>
    <br><br>
    Altura inicial <input type="text" id="ipt_alturaInicial">
    <br><br>
    Altura final <input type="text" id="ipt_alturaFinal">
    <br><br>
    Informe o nome do candidato: <input type="text" id="ipt_candidato">
    <br><br>
    Informe a altura do candidato: <input type="text" id="ipt_altura">
    <br><br>
    <button onclick="selecaoPilotos()">Verificar candidato</button>
    <div id="msgSelecaoFinal"></div>
    
</body>
</html>
<script>
    function selecaoPilotos() {
        let alturaInicial = Number(ipt_alturaInicial.value);
        let alturaFinal = Number(ipt_alturaFinal.value);
        let candidato = ipt_candidato.value;
        let altura = Number(ipt_altura.value);

        if (alturaInicial < 1 && alturaFinal < alturaInicial) {
            alert('Intervalo da altura de seleção é inválida! A altura inicial deve ser maior que 1 e a altura final deve ser maior que a altura inicial');
        } else if (altura >= alturaInicial && altura <= alturaFinal) {
            msgSelecaoFinal.innerHTML += `O candidato ${candidato}, com altura de ${altura.toFixed(2)} metros, participará do processo de seleção de piloto.<br>`;  
        } else {
            msgSelecaoFinal.innerHTML += `Infelizmente, o candidato ${candidato}, com altura de ${altura} metros, não atende os requisitos da seleção.<br>`;
        }

    }
</script>
