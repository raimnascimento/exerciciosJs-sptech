<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h2>Login Seguro: Verificação em Duas Etapas!</h2>

    Informe seu login: <input type="text" id="ipt_login">
    <br><br>
    Informe sua senha: <input type="password" id="ipt_senha">
    <br><br>
    Informe o código de segurança: <input type="text" id="ipt_cod">
    <br><br>
    <button onclick="loginSeguro()">Entrar</button>
    
</body>
</html>
<script>
    function loginSeguro() {
        let login = ipt_login.value;
        let senha = ipt_senha.value;
        let cod = ipt_cod.value;

        if (login == 'SPTech' && senha == 'digital' && cod == 123) {
            alert('Usuário autenticado com sucesso');
        } else {
            alert('Falha na autenticação');
        }
    }
</script>
