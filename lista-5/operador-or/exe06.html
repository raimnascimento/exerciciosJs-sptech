<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Calculadora de Cansaço do Aluno SPTech</h2>

    Meio de transporte: <input type="text" id="ipt_transporte">
    <br><br>
    <button onclick="transporteAluno()">Calcular cansaço</button>
    
</body>
</html>
<script>
    function transporteAluno() {
        let transporte = ipt_transporte.value;

        if (transporte == 'carro' || transporte == 'uber') {
            alert('Tá tranquilo...');
        } else if (transporte == 'metrô' || transporte == 'ônibus') {
            alert('Um pouco cansado');
        } else {
            alert('Vish... vive cansado.')
        }
    }
</script>
