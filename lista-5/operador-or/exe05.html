<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h2>Alerta de Desconforto Térmico</h2>

    Temperatura: <input type="text" id="ipt_temperatura">
    <br><br>
    <button onclick="analiseTermica()">Analisar clima</button>
</body>
</html>
<script>
    function analiseTermica() {
        let temperatura = Number(ipt_temperatura.value);

        if (temperatura < 21 || temperatura > 24) {
            alert('Alerta de desconforto!');
            if (temperatura < 21) {
                alert('As pessoas vão ter hipotermia');
            } else if (temperatura > 24) {
                alert('As pessoas vão derreter');
            }
        } 
    }
</script>
