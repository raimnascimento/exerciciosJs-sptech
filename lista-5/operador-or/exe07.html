<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h2>Calculadora de Cansaço Aprimorada do Aluno SPTech</h2>

    Meio de transporte: <input type="text" id="ipt_transporte">
    Distância da faculdade (KM): <input type="text" id="ipt_distancia">
    <br><br>
    <button onclick="transporteAluno()">Calcular cansaço</button>
    
</body>
</html>
<script>
    function transporteAluno() {
        let transporte = ipt_transporte.value;
        let distanciaKm = Number(ipt_distancia.value);

        if (distanciaKm <= 10) {
            if (transporte == 'carro' || transporte == 'metrô' || transporte == 'ônibus') {
                alert('Tá tranks...');
            } else {
                alert ('É... um pouco cansado...');
            }
        } else {
            if (transporte == 'carro') {
                alert('É... um pouco cansado...');
            } else if (transporte == 'metrô' || transporte == 'ônibus') {
                alert('Bem cansado...');
            } else {
                alert('Vish... tá só o pó...');
            }
        }
    }
</script>
