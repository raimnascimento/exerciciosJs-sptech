<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios</title>
</head>
<body>
    <h2>Analisador de Compra: Escolhendo a Melhor TV Dentro do Orçamento</h2>

    <b>Opções aceitas: </b><i>Samsung, LG, Mondial e Britânia</i>
    <br><br>
    Marca da TV: <input type="text" id="ipt_marcaTV">
    <br><br>
    Preço da TV: <input type="text" id="ipt_precoTV">
    <br><br>
    <button onclick="analiseCompra()">Analisar compra</button>
    <br><br>
    <div id="msgTV"></div>
    
</body>
</html>
<script>
    function analiseCompra() {
        let marca = ipt_marcaTV.value;
        let preco = Number(ipt_precoTV.value);

        if (preco < 800 || preco > 2000) {
            msgTV.innerHTML = `TV fora da faixa de preço.<br>`;
            if (preco < 800) {
                msgTV.innerHTML += `Preço baixo demais!`;
            } else if (preco > 2000) {
                msgTV.innerHTML += `TV cara demais, infelizmente.`;
            }
        } else if ((preco > 799 && preco <= 2000) && marca == 'britânia' || marca == 'mondial' ) {
            msgTV.innerHTML = `Na faixa de preço, porém marca não confiável`;
        } else if ((preco > 799 && preco <= 2000) && marca == 'lg' || marca == 'samsung') {
            msgTV.innerHTML = `Essa TV pode entrar na sua lista!`;
        }

    }
</script>
