<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h2>Auxílio Emergencial Covid-19</h2>

    Informe o valor da renda individual: <input type="text" id="ipt_renda">
    <br><br>
    Informe o valor da renda familiar: <input type="text" id="ipt_rendaFamiliar">
    <br><br>
    <button onclick="auxilioCovid()">Terei o benefício</button>
    <br><br>
    <div id="msgAuxilio"></div>
    
</body>
</html>
<script>
    function auxilioCovid() {
        let renda = Number(ipt_renda.value);
        let rendaFamiliar = Number(ipt_rendaFamiliar.value);

        if (renda < 2001 || rendaFamiliar < 3001) {
            msgAuxilio.innerHTML = `Você terá direito ao auxílio`;
        } else {
            msgAuxilio.innerHTML = `Sem direito ao auxílio`;
        }
    }
</script>
