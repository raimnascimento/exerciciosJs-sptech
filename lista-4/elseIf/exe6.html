<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Times Paulistas: O Canto da Sua Torcida!</h2>

    Qual time você torce? <input type="text" id="ipt_time">
    <br>
    <p style="color: red"><b>Atenção! Só pode os times: São Paulo, Corinthians, Santos e Palmeiras</b></p>
    <br><br>
    <button onclick="mostrarTime()">Fale sobre esse time</button>
    <br><br>
    <div id="msgTime"></div>
    
</body>
</html>
<script>
    function mostrarTime() {
        let time = ipt_time.value;

        if (time == 'Corinthians' || time == 'corinthians') {
            msgTime.innerHTML = `<p style="background-color:black; color: white">Salve o Corinthians</p>`;     
        } else if (time == 'Palmeiras' || time == 'palmeiras') {
            msgTime.innerHTML = `<p style="background-color: green; color: white">Salve o alviverde imponente</p>`;
        } else if (time == 'Santos' || time == 'santos') {
            msgTime.innerHTML = `<p style="background-color: white; color: black">Agora quem dá a bola é o Santos</p>`;
        } else {
            msgTime.innerHTML = `<p style="background-color: black; color: red">Salve o Tricolor paulista</p>`;
        }
    }
</script>
