<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h2>Classe Social em Tuvalu: Em Qual Você se Encaixa?</h2>

    Informe a renda familiar mensal: <input type="text" id="ipt_rendaFamiliar">
    <br><br>
    <button onclick="rendaMensal()">Analisar renda</button>
    <br><br>
    <div id="msgSobreRenda"></div>

</body>
</html>
<script>
    function rendaMensal() {
        let renda = Number(ipt_rendaFamiliar.value);

        if (renda < 251) {
            msgSobreRenda.innerHTML = `Renda familiar R$: ${renda.toFixed(2)}. <br>Classe E.`;
        } else if (renda > 250 && renda <= 900) {
            msgSobreRenda.innerHTML = `Renda familiar R$: ${renda.toFixed(2)}. <br>Classe D.`;
        } else if (renda > 900 && renda <= 2500) {
            msgSobreRenda.innerHTML = `Renda familiar R$: ${renda.toFixed(2)}. <br>Classe C.`;
        } else if (renda > 2500 && renda <= 9500) {
            msgSobreRenda.innerHTML = `Renda familiar R$: ${renda.toFixed(2)}. <br>Classe B.`;
        } else {
            msgSobreRenda.innerHTML = `Renda familiar R$: ${renda.toFixed(2)}. <br>Classe A.`;
        }
    }
</script>
