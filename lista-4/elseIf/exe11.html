<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <h2>Controle da Umidade do Ar</h2>

    Informe a umidade relativa atual do ambiente: <input type="text" id="ipt_umidade">
    <br><br>
    <button onclick="umidadeRelativa()">Verificar umidade</button>
    <br><br>
    <div id="msgUmidade"></div>
    
</body>
</html>
<script>
    function umidadeRelativa() {
        let umidade = Number(ipt_umidade.value);

        if (umidade > 100) {
            alert(`Alerta de erro! - Umidade relativa acima de 100: ${umidade}`)
        } else if (umidade > 30) {
            msgUmidade.innerHTML = `Umidade relativa do ar: ${umidade} - Nenhum risco`;
        } else if (umidade <= 30 && umidade > 20) {
            msgUmidade.innerHTML = `Umidade relativa do ar: ${umidade} - Estado de atenção`;
        } else if (umidade <= 20 && umidade > 11) {
            msgUmidade.innerHTML = `Umidade relativa do ar: ${umidade} - Estado de alerta`;
        } else {
            msgUmidade.innerHTML = `Umidade relativa do ar: ${umidade} - Estado de emergência`;
        }
    }
</script>
