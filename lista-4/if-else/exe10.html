<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <h2>Controle de horas assistindo streaming</h2>

    Informe a última série (SITCOM) que você assistiu: <input type="text" id="ipt_serie">
    <br><br>
    Informe a quantidade de episódios que você já assistiu: <input type="text" id="ipt_episodios">
    <br><br>
    <button onclick="controleStreaming()">Verificar nível</button>
    <br><br>
    <div id="msgUsuarioFinal"></div>
    
</body>
</html>
<script>
    function controleStreaming() {
        let nomeSerie = ipt_serie.value;
        let duracaoEp = 22;
        let qtdTotalAssistidos = (Number(ipt_episodios.value) * duracaoEp) / 60;

        if (qtdTotalAssistidos < 30) {
            msgUsuarioFinal.innerHTML = `Vejo que você gosta da série ${nomeSerie}.`;
        } else {
            msgUsuarioFinal.innerHTML = `Vejo que você gosta da série ${nomeSerie}.<br>Uau, você realmente gosta dessa série!`;
        }
    
    }
</script>
