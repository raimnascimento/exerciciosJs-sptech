<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h2>Permissão para festa</h2>
    
    Informe a sua idade: <input type="text" id="ipt_idade">
    <br><br>
    <button onclick="resultadoFesta()">Ir pra festa</button>
    <br><br>
    <div id="divVaiPraFesta"></div>
    
</body>
</html>
<script>
    function resultadoFesta() {
        idade = Number(ipt_idade.value);

        if (idade < 18) {
            divVaiPraFesta.innerHTML = `Pedir permissão pro responsável.<br>#partiuFesta`;
        } else {
            divVaiPraFesta.innerHTML = `#partiuFesta`;
        }
    }
</script>
