<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h2>Rola a pizza? (Parte 2)</h2>

    Informe o valor da pizza: <input type="text" id="ipt_valorPizza">
    <br><br>
    Informe a quantidade de amigos reunidos: <input type="text" id="ipt_qtdAmigos">
    <br><br>
    <button onclick="noiteDaPizza()">Rola a pizza?</button>
    <br><br>
    <div id="divMensagemPizza"></div>
    
</body>
</html>
<script>
    function noiteDaPizza() {
        valorASerPago = Number(ipt_valorPizza.value) / Number(ipt_qtdAmigos.value);

        if (valorASerPago < 20) {
            divMensagemPizza.innerHTML = `<b><i>Cada amigo vai pagar R$${valorASerPago.toFixed(2)} pela pizza.<i><b>`;
        } else {
            divMensagemPizza.innerHTML = `<b><i>Cada amigo vai pagar R$${valorASerPago.toFixed(2)} pela pizza.<br><p style="color:red">Deu ruim! Pizza muito cara!</p><i><b>`;
        }
    }
</script>
