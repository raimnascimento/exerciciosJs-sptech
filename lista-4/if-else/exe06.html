<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h2>Conta de luz</h2>

    Informe a quantidade de KWh consumida no mês: <input type="text" id="ipt_kwh">
    <br><br>
    <button onclick="calcularLuz()">Calcular conta de luz</button>
    <br><br>
    <div id="msgContaDeLuz"></div>
    
</body>
</html>
<script>
    function calcularLuz() {
        let KMh = Number(ipt_kwh.value);
        // let consumo = (KMh * KMh) * 24 * 30/1000;
        let luz = 0.85;
        let valorAPagar = luz * KMh;
        
        // Consumo (kWh) = Potência (kW) × Horas (h) × Dias (d) / 1000.   
        
        if (KMh < 100) {
            valorAPagar = valorAPagar - (valorAPagar * 10/100);
            msgContaDeLuz.innerHTML = `Que legal! Você recebeu um desconto na sua conta.<br>Você irá pagar ${valorAPagar.toFixed(2)}.`;
        } else {
            msgContaDeLuz.innerHTML = `Você irá pagar ${valorAPagar.toFixed(2)}.`;
        }
    }
</script>
