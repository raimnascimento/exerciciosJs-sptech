<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h2, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <h2>Análise da c/c (Conta Corrente)</h2>

    Saldo da conta: <input type="number" id="ipt_saldo">
    <br><br>
    Valor do débito: <input type="number" id="ipt_debito">
    <br><br>
    <button onclick="analiseCC()">Analisar conta</button>
    <br><br>
    <div id="divSaldo"></div>
    
</body>
</html>
<script>
    function analiseCC() {
        let saldoInput = ipt_saldo.value;
        let debitoInput = ipt_debito.value;
        let saldo = Number(saldoInput);
        let debito = Number(debitoInput);
        let novoSaldo = saldo - debito;
        let erros = '';

        if (saldoInput === '') {
            erros += 'Informe o saldo atual / ';
        }
        if (debitoInput === '') {
            erros += 'Informe o valor a ser debitado / ';
        }

        if (erros === '') {
            if (novoSaldo < 0) {
                divSaldo.innerHTML = `<p style="color:red"><b>O saldo atual da conta corrente é ${novoSaldo.toFixed(2)}</b></p>`;
            } else {
                divSaldo.innerHTML = `<p style="color:blue"><i>O saldo atual da conta corrente é ${novoSaldo.toFixed(2)}</i></p>`;
            }
        } else {
            alert(erros);
        }

        

    }
</script>
