<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
</head>
<body>
    <h2>Controle de peso no elevador - v2</h2>

    Quantidade de homens no elevador: <input type="number" id="ipt_qtdHomens">
    <br><br>
    Quantidade de mulheres no elevador: <input type="number" id="ipt_qtdMulheres">
    <br><br>
    <button onclick="elevador()">Ligar elevador</button>
    <br><br>
    <div id="msgPesoElevador"></div>
    
</body>
</html>
<script>
    function elevador() {
        let qtdHInput = ipt_qtdHomens.value;
        let qtdMInput = ipt_qtdMulheres.value;
        let qtdHomens = Number(qtdHInput);
        let qtdMulheres = Number(qtdMInput);
        let pesoHomens = qtdHomens * 90;
        let pesoMulheres = qtdMulheres * 70;
        let pesoTotal = pesoHomens + pesoMulheres;
        let erros = '';

        if (qtdHInput === '') {
            erros += `Informe a quantidade de homens para prosseguir / `;
        }
        if (qtdMInput === '') {
            erros += `Informe a quantidade de mulheres para prosseguir / `;
        }

        if (erros === '') {
            if (pesoTotal <= 500) {
                msgPesoElevador.innerHTML = `<p style="color:green">O elevador irá se mover, pois o peso está em ${pesoTotal} KG</p>`;
            } else {
                msgPesoElevador.innerHTML = `<p style="color:red">Alguém precisa descer, precisa perder ${pesoTotal - 500} KG para mover o elevador</p>`;
            }
        } else {
            alert(erros);
        }
    }
</script>
