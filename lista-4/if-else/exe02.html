<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h2>Controle de Refrigerante</h2>

    Quantas latinhas de refrigerante você bebe por dia? <input type="text" id="ipt_qtdRefrigerante">
    <br><br>
    <button onclick="qtdRefri()">Quantos refris?</button>
    <br><br>
    <div id="divRefrigerante"></div>
    
</body>
</html>
<script>
    function qtdRefri() {
        refriDiario = Number(ipt_qtdRefrigerante.value);
        qtdConsumida = refriDiario * 365;

        if(qtdConsumida < 500) {
            divRefrigerante.innerHTML = `A quantidade de latinhas que você consome por ano são ${qtdConsumida} latinhas.`;
        } else {
            divRefrigerante.innerHTML = `A quantidade de latinhas que você consome por ano são ${qtdConsumida} latinhas.<br>Cuidado com a diabetes!`;
        }
    }
</script>
