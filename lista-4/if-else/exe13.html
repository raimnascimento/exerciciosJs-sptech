<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>
<body>
    <h2>Verificação das finanças</h2>

    Valor do saldo na conta bancária: <input type="number" id="ipt_saldo">
    <br><br>
    <button onclick="verificarSaldo()">Verificar finanças</button>
    <br><br>
    <div id="divMsgSaldo"></div>
    
</body>
</html>
<script>
    function verificarSaldo() {
        let saldoInput = ipt_saldo.value;
        let saldo = Number(saldoInput)
        let erros = false;

        if (saldoInput === '') {
            erros = true;
        }

        if (erros === false) {
            if (saldo === 0) {
                divMsgSaldo.innerHTML = `Conta zerada`;
            } else {
                if (saldo < 0) {
                    divMsgSaldo.innerHTML = `<p style="color: red">Está devendo!</p>`;
                } else {
                    divMsgSaldo.innerHTML = `<p style="color: blue">Saldo positivo! :)</p>`;
                }
            }
        } else {
            alert('Informe algum valor de saldo, por favor.');
        }
    }
</script>
