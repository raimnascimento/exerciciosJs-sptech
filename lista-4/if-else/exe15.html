<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>
    <h2>Análise da média de notas</h2>

    Informe a primeira nota: <input type="number" id="ipt_nota1">
    <br><br>
    Informe a segunda nota: <input type="number" id="ipt_nota2">
    <br><br>
    <button onclick="media()">Verificar situação</button>
    <br><br>
    <div id="msgNota"></div>

    
</body>
</html>
<script>
    function media() {
        let nota1Input = ipt_nota1.value;
        let nota2Input = ipt_nota2.value;
        let nota1 = Number(nota1Input);
        let nota2 = Number(nota2Input);
        let erros = false;
        let media = (nota1 + nota2) / 2;

        if (nota1Input === '') {
            alert('Informe a primeira nota, por favor');
            erros = true;
        }

        if (nota2Input === '') {
            alert('Informe a segunda nota, por favor');
            erros = true;
        }

        if (erros === false) {
            if (media >= 6) {
                msgNota.innerHTML = `Parabéns, aprovado!`;
            } else {
                msgNota.innerHTML = `Tente outra vez...`;
            }
        } 
    }
</script>
