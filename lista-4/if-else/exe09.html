<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <h2>Controle de peso no elevador</h2>
    Informe a quantidade de homens dentro do elevador: <input type="text" id="ipt_homens">
    <br><br>
    Informe a quantidade de mulheres dentro do elevador: <input type="text" id="ipt_mulheres">
    <br><br>
    <button onclick="analiseElevador()">Analisar peso</button>
    <div id="msgPesoElevador"></div>
    
</body>
</html>
<script>
    function analiseElevador() {
        let peso = (Number(ipt_homens.value) * 80) + (Number(ipt_mulheres.value) * 60)

        if (peso < 800) {
            msgPesoElevador.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${peso}kg.`;
        } else {
            msgPesoElevador.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${peso}kg.<br><p style="color: blue">Será necessário que alguém desça para que o elevador se movimente.</p>`;
        }
    }
</script>
