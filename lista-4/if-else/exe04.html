<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>
    <h2>Rola a pizza?</h2>

    Informe o valor da pizza: <input type="text" id="ipt_valorPizza">
    <br><br>
    Informe a quantidade de amigos reunidos: <input type="text" id="ipt_qtdAmigos">
    <br><br>
    <button onclick="noiteDaPizza()">Rola a pizza?</button>
    <br><br>
    <div id="divMensagemPizza"></div>
    
</body>
</html>
<script>
    function noiteDaPizza() {
        valorASerPago = Number(ipt_valorPizza.value) / Number(ipt_qtdAmigos.value);

        if (valorASerPago < 20) {
            divMensagemPizza.innerHTML = `Cada amigo vai pagar R$${valorASerPago.toFixed(2)} pela pizza.`;
        } else {
            divMensagemPizza.innerHTML = `Cada amigo vai pagar R$${valorASerPago.toFixed(2)} pela pizza.<br>Deu ruim! Pizza muito cara!`;
        }
    }
</script>
